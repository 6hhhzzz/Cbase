# ============================================================
# Cbase 企业知识库 — 一键部署
# 使用: docker compose up -d
# 访问: http://localhost  (前端)，http://localhost:8080 (Java)
# ============================================================

services:

  # ============================================================
  # PostgreSQL 16 + pgvector
  # ============================================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kes
      POSTGRES_USER: kes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/init-admin.sql:/docker-entrypoint-initdb.d/02-init-admin.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kes -d kes"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kes-net

  # ============================================================
  # Redis 7
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: kes-redis
    restart: unless-stopped
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
      --save 900 1 --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kes-net

  # ============================================================
  # RabbitMQ 3.x
  # ============================================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: kes-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: kes
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kes-net

  # ============================================================
  # MinIO 对象存储
  # ============================================================
  minio:
    image: minio/minio:latest
    container_name: kes-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - kes-net

  # ============================================================
  # Python AI Service — RAG 引擎
  # ============================================================
  ai-service:
    build: ./ai-service
    container_name: kes-ai-service
    restart: unless-stopped
    environment:
      # 基础设施 — Docker 内部服务名
      PGVECTOR__HOST: postgres
      PGVECTOR__PORT: "5432"
      PGVECTOR__USER: kes
      PGVECTOR__PASSWORD: ${POSTGRES_PASSWORD}
      RABBITMQ__HOST: rabbitmq
      RABBITMQ__PORT: "5672"
      RABBITMQ__USER: kes
      RABBITMQ__PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      REDIS__HOST: redis
      REDIS__PORT: "6379"
      MINIO__ENDPOINT: minio:9000
      MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # LLM API Key — 从 .env 传入
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      # Java 后端地址
      KES_JAVA_URL: http://kes-backend:8080
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - kes-net

  # ============================================================
  # Java Backend — Spring Boot 业务服务
  # ============================================================
  backend:
    build: ./backend
    container_name: kes-backend
    restart: unless-stopped
    environment:
      # 基础设施 — Docker 内部服务名
      KES_DB_HOST: postgres
      KES_DB_PORT: "5432"
      KES_DB_USER: kes
      KES_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KES_REDIS_HOST: redis
      KES_REDIS_PORT: "6379"
      KES_MQ_HOST: rabbitmq
      KES_MQ_PORT: "5672"
      KES_MQ_USER: kes
      KES_MQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      KES_MINIO_ENDPOINT: minio:9000
      KES_MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      KES_MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      KES_MINIO_BUCKET: kes-documents
      # JWT 密钥
      KES_JWT_SECRET: ${KES_JWT_SECRET}
      # Python AI Service 地址
      AISERVICE_BASE_URL: http://kes-ai-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - kes-net

  # ============================================================
  # Frontend — Vue 3 SPA (Nginx 静态服务 + API 代理)
  # ============================================================
  frontend:
    build: ./frontend
    container_name: kes-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - kes-net

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

# ============================================================
# Network
# ============================================================
networks:
  kes-net:
    driver: bridge
